name: Trigger Website Deploy

on:
    push:
        branches: [main]
        paths:
            - "blog/**"
            - "events/**"
            - "team/**"

jobs:
    trigger-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Trigger website rebuild
              run: |
                  curl -X POST \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: Bearer ${{ secrets.WEBSITE_REPO_PAT }}" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    https://api.github.com/repos/NUSAISoc/aisoc-website/dispatches \
                    -d '{"event_type": "content-update"}'
